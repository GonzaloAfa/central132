name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/deploy-lambda.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # --- Collector Lambda ---
      - name: Deploy collector Lambda
        run: |
          cd dist && zip ../collector.zip handler.js && cd ..
          FUNCTION_NAME="central132-collector"
          ROLE_ARN="arn:aws:iam::287698983131:role/central132-lambda-role"

          if aws lambda get-function --function-name $FUNCTION_NAME 2>/dev/null; then
            aws lambda update-function-code \
              --function-name $FUNCTION_NAME \
              --zip-file fileb://collector.zip
            sleep 5
            aws lambda update-function-configuration \
              --function-name $FUNCTION_NAME \
              --environment "Variables={MONGODB_URI=${{ secrets.MONGODB_URI }}}"
          else
            aws lambda create-function \
              --function-name $FUNCTION_NAME \
              --runtime nodejs20.x \
              --handler handler.handler \
              --role $ROLE_ARN \
              --zip-file fileb://collector.zip \
              --timeout 30 \
              --memory-size 128 \
              --environment "Variables={MONGODB_URI=${{ secrets.MONGODB_URI }}}"
            sleep 10
            aws events put-rule \
              --name central132-collector-schedule \
              --schedule-expression "rate(15 minutes)"
            LAMBDA_ARN=$(aws lambda get-function --function-name $FUNCTION_NAME --query 'Configuration.FunctionArn' --output text)
            aws lambda add-permission \
              --function-name $FUNCTION_NAME \
              --statement-id eventbridge-invoke \
              --action lambda:InvokeFunction \
              --principal events.amazonaws.com \
              --source-arn arn:aws:events:${{ secrets.AWS_REGION }}:287698983131:rule/central132-collector-schedule
            aws events put-targets \
              --rule central132-collector-schedule \
              --targets "Id=central132-collector,Arn=$LAMBDA_ARN"
          fi

      # --- API Lambda ---
      - name: Deploy API Lambda
        run: |
          cd dist && zip ../api.zip api.js && cd ..
          FUNCTION_NAME="central132-api"
          ROLE_ARN="arn:aws:iam::287698983131:role/central132-lambda-role"

          if aws lambda get-function --function-name $FUNCTION_NAME 2>/dev/null; then
            aws lambda update-function-code \
              --function-name $FUNCTION_NAME \
              --zip-file fileb://api.zip
            sleep 5
            aws lambda update-function-configuration \
              --function-name $FUNCTION_NAME \
              --environment "Variables={MONGODB_URI=${{ secrets.MONGODB_URI }}}"
          else
            aws lambda create-function \
              --function-name $FUNCTION_NAME \
              --runtime nodejs20.x \
              --handler api.handler \
              --role $ROLE_ARN \
              --zip-file fileb://api.zip \
              --timeout 15 \
              --memory-size 128 \
              --environment "Variables={MONGODB_URI=${{ secrets.MONGODB_URI }}}"
            sleep 10
            # Create Function URL
            aws lambda create-function-url-config \
              --function-name $FUNCTION_NAME \
              --auth-type NONE \
              --cors '{"AllowOrigins":["*"],"AllowMethods":["GET","OPTIONS"],"AllowHeaders":["Content-Type"],"MaxAge":86400}'
            aws lambda add-permission \
              --function-name $FUNCTION_NAME \
              --statement-id public-access \
              --action lambda:InvokeFunctionUrl \
              --principal "*" \
              --function-url-auth-type NONE
          fi

          # Output the Function URL
          API_URL=$(aws lambda get-function-url-config --function-name $FUNCTION_NAME --query 'FunctionUrl' --output text 2>/dev/null || echo "")
          echo "API_URL=$API_URL" >> $GITHUB_ENV
          echo "API Function URL: $API_URL"
