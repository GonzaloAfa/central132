name: Publish to Chrome Web Store

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from manifest
        id: manifest
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST="${{ steps.manifest.outputs.version }}"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag v$TAG does not match manifest version $MANIFEST"
            exit 1
          fi

      - name: Build extension zip
        run: |
          zip -r extension.zip \
            manifest.json \
            src/ \
            assets/ \
            -x "*.DS_Store"

      - name: Upload zip to release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            extension.zip#central132-${{ steps.manifest.outputs.version }}.zip

      - name: Upload to Chrome Web Store
        run: |
          # Exchange refresh token for access token
          ACCESS_TOKEN=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to obtain access token"
            exit 1
          fi

          # Upload zip
          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -T extension.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}")

          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
          BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
          echo "Upload response ($HTTP_CODE): $BODY"

          UPLOAD_STATUS=$(echo "$BODY" | jq -r '.uploadState')
          if [ "$UPLOAD_STATUS" != "SUCCESS" ]; then
            echo "::error::Upload failed with state: $UPLOAD_STATUS"
            echo "$BODY" | jq '.itemError // empty'
            exit 1
          fi

          # Publish to production
          PUBLISH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}/publish")

          HTTP_CODE=$(echo "$PUBLISH_RESPONSE" | tail -1)
          BODY=$(echo "$PUBLISH_RESPONSE" | sed '$d')
          echo "Publish response ($HTTP_CODE): $BODY"

          PUBLISH_STATUS=$(echo "$BODY" | jq -r '.status[0]')
          if [ "$PUBLISH_STATUS" != "OK" ] && [ "$PUBLISH_STATUS" != "PUBLISHED_WITH_FRICTION_WARNING" ]; then
            echo "::error::Publish failed with status: $PUBLISH_STATUS"
            exit 1
          fi

          echo "✅ Extension v${{ steps.manifest.outputs.version }} published successfully"
