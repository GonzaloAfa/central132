name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/deploy-frontend.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build
        run: VITE_API_URL=${{ secrets.API_URL }} npx vite build

      - name: Deploy to S3
        run: |
          BUCKET="central132-frontend"
          if ! aws s3 ls "s3://$BUCKET" 2>/dev/null; then
            aws s3 mb "s3://$BUCKET" --region ${{ secrets.AWS_REGION }}
          fi
          aws s3 sync dist/ "s3://$BUCKET" --delete \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "no-cache"

      - name: Setup CloudFront
        run: |
          BUCKET="central132-frontend"
          REGION="${{ secrets.AWS_REGION }}"
          ACCOUNT_ID="287698983131"

          # Check if distribution already exists
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='central132-frontend'].Id | [0]" \
            --output text 2>/dev/null || echo "None")

          if [ "$DIST_ID" = "None" ] || [ -z "$DIST_ID" ]; then
            echo "Getting or creating OAC..."
            OAC_ID=$(aws cloudfront list-origin-access-controls \
              --query "OriginAccessControlList.Items[?Name=='central132-oac'].Id | [0]" \
              --output text 2>/dev/null || echo "None")
            if [ "$OAC_ID" = "None" ] || [ -z "$OAC_ID" ]; then
              OAC_ID=$(aws cloudfront create-origin-access-control \
                --origin-access-control-config \
                  Name=central132-oac,SigningProtocol=sigv4,SigningBehavior=always,OriginAccessControlOriginType=s3,Description=central132 \
                --query 'OriginAccessControl.Id' --output text)
            fi
            echo "OAC ID: $OAC_ID"

            echo "Creating CloudFront distribution..."
            cat > /tmp/cf-config.json << CFEOF
          {
            "CallerReference": "central132-$(date +%s)",
            "Comment": "central132-frontend",
            "DefaultCacheBehavior": {
              "TargetOriginId": "s3-${BUCKET}",
              "ViewerProtocolPolicy": "redirect-to-https",
              "CachePolicyId": "658327ea-f89d-4fab-a63d-7e88639e58f6",
              "Compress": true
            },
            "Origins": {
              "Quantity": 1,
              "Items": [{
                "Id": "s3-${BUCKET}",
                "DomainName": "${BUCKET}.s3.${REGION}.amazonaws.com",
                "S3OriginConfig": { "OriginAccessIdentity": "" },
                "OriginAccessControlId": "${OAC_ID}"
              }]
            },
            "DefaultRootObject": "index.html",
            "CustomErrorResponses": {
              "Quantity": 1,
              "Items": [{
                "ErrorCode": 404,
                "ResponseCode": "200",
                "ResponsePagePath": "/index.html",
                "ErrorCachingMinTTL": 10
              }]
            },
            "Enabled": true
          }
          CFEOF

            DIST_ID=$(aws cloudfront create-distribution \
              --distribution-config file:///tmp/cf-config.json \
              --query 'Distribution.Id' --output text)

            echo "Distribution created: $DIST_ID"

            # Add bucket policy for CloudFront access
            DIST_ARN="arn:aws:cloudfront::${ACCOUNT_ID}:distribution/${DIST_ID}"
            aws s3api put-bucket-policy --bucket $BUCKET --policy "{
              \"Version\": \"2012-10-17\",
              \"Statement\": [{
                \"Sid\": \"AllowCloudFront\",
                \"Effect\": \"Allow\",
                \"Principal\": { \"Service\": \"cloudfront.amazonaws.com\" },
                \"Action\": \"s3:GetObject\",
                \"Resource\": \"arn:aws:s3:::${BUCKET}/*\",
                \"Condition\": { \"StringEquals\": { \"AWS:SourceArn\": \"${DIST_ARN}\" } }
              }]
            }"
          else
            echo "Invalidating CloudFront cache..."
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/index.html"
          fi

          DOMAIN=$(aws cloudfront get-distribution --id "$DIST_ID" --query 'Distribution.DomainName' --output text)
          echo "Frontend URL: https://$DOMAIN"
