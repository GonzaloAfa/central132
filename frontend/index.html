<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central132 - Mapa de Emergencias</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <button id="menu-toggle" aria-label="Filtros">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span id="menu-status"></span>
  </button>
  <div id="controls">
    <div class="controls-top">
      <h1>Central132</h1>
      <div class="filters-grid">
        <div class="filter-group">
          <label for="range">Periodo</label>
          <select id="range">
            <option value="4h" selected>Ultimas emergencias</option>
            <option value="24h">Ultimas 24 horas</option>
            <option value="7d">Ultimos 7 dias</option>
            <option value="30d">Ultimos 30 dias</option>
            <option value="90d">Ultimos 90 dias</option>
            <option value="custom">Personalizado</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="comuna">Comuna</label>
          <select id="comuna">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="clave">Tipo emergencia</label>
          <select id="clave">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="filter-group filter-action">
          <label>&nbsp;</label>
          <button id="search">Buscar</button>
        </div>
      </div>
      <div id="custom-dates" class="filter-group" style="display:none">
        <div class="date-row">
          <label for="from">Desde</label>
          <input type="date" id="from" />
        </div>
        <div class="date-row">
          <label for="to">Hasta</label>
          <input type="date" id="to" />
        </div>
      </div>
      <div class="controls-footer">
        <div id="status"></div>
        <div class="legend">
          <div class="legend-item"><span class="dot red"></span> &lt; 10 min</div>
          <div class="legend-item"><span class="dot yellow"></span> 10 - 60 min</div>
          <div class="legend-item"><span class="dot green"></span> 1 - 4 hrs</div>
          <div class="legend-item"><span class="dot gray"></span> &gt; 4 hrs</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="heatmap" />
          Mapa de calor
        </label>
      </div>
    </div>
    <div class="credits">
      Datos obtenidos de <a href="https://central132.cl/" target="_blank" rel="noopener">central132.cl</a>
    </div>
  </div>
  <div id="map"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
